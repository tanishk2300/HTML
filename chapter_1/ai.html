<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Links Hub — Google • Facebook • YouTube</title>
  <style>
    
    :root{--bg:#f6f8fb;--card:#ffffff;--muted:#6b7280;--accent:#0ea5e9}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:linear-gradient(180deg,var(--bg),#eef2f7);color:#0f172a}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
    .card{width:100%;max-width:980px;background:var(--card);border-radius:16px;padding:28px;box-shadow:0 8px 30px rgba(15,23,42,0.08)}
    header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
    h1{font-size:20px;margin:0}
    nav a{margin-left:12px;color:var(--muted);text-decoration:none;font-weight:600}
    .search{display:flex;gap:10px;margin-bottom:22px}
    .search input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid #e6e9ef;font-size:15px}
    .search button{padding:10px 16px;border-radius:10px;border:0;background:var(--accent);color:white;font-weight:700;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .tile{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;border-radius:12px;border:1px solid #eef2f6;text-align:center;text-decoration:none;color:inherit;transition:transform .12s ease, box-shadow .12s ease}
    .tile:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(14,165,233,0.08)}
    .logo{width:56px;height:56px;margin-bottom:10px}
    .label{font-weight:700;margin-bottom:6px}
    .desc{font-size:13px;color:var(--muted)}
    footer{margin-top:18px;font-size:13px;color:var(--muted);text-align:center}
    @media (max-width:720px){.grid{grid-template-columns:repeat(1,1fr)}header{flex-direction:column;align-items:flex-start;gap:12px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="main">
      <header>
        <h1>Links Hub</h1>
        <nav aria-label="quick links">
          <a href="https://www.google.com" target="_blank" rel="noopener noreferrer">Google</a>
          <a href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">Facebook</a>
          <a href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">YouTube</a>
        </nav>
      </header>

      <form id="quickForm" class="search" onsubmit="return handleSubmit(event)">
        <input id="q" name="q" type="text" placeholder="Search Google or paste a full URL (example: https://example.com)" aria-label="search or url" autocomplete="off" />
        <button type="submit">Go</button>
      </form>

      <section class="grid" aria-label="main links">
        <a class="tile" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
          <svg class="logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.9 0 6.5 1.7 8 3.1l6-5.8C34.8 3.9 29.9 2 24 2 14.8 2 6.9 7.5 3.3 15.6l7.3 5.7C12.1 16 17.6 9.5 24 9.5z"/>
            <path fill="#34A853" d="M46.5 24.5c0-1.6-.1-2.9-.4-4.2H24v8h12.7c-.5 2.8-2.1 5.2-4.6 6.8l7.1 5.5C44.9 37.2 46.5 31.6 46.5 24.5z"/>
            <path fill="#4A90E2" d="M10.6 29.3A14 14 0 0 1 9 24.5c0-1.6.3-3.2.9-4.6L3 14.3C1.1 17.4 0 20.8 0 24.5c0 3 1 5.9 2.9 8.5l7.7-3.7z"/>
            <path fill="#FBBC05" d="M24 46c6.2 0 11.6-2.1 15.8-5.6l-7.1-5.5C30.6 36 27.4 37 24 37c-7.2 0-13.2-4.8-15.1-11.2L3.3 33.6C7.2 41.9 14.8 46 24 46z"/>
          </svg>
          <div class="label">Google</div>
          <div class="desc">Search the web, images, maps and more</div>
        </a>

        <a class="tile" href="https://www.facebook.com" target="_blank" rel="noopener noreferrer">
          <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#1877F2" d="M22 12.07C22 6.48 17.52 2 11.93 2S2 6.48 2 12.07c0 4.99 3.66 9.13 8.44 9.92v-7.02H7.9v-2.9h2.54V9.13c0-2.5 1.5-3.88 3.77-3.88 1.09 0 2.23.2 2.23.2v2.45h-1.25c-1.23 0-1.62.77-1.62 1.56v1.88h2.77l-.44 2.9h-2.33v7.02C18.34 21.2 22 17.06 22 12.07z"/>
          </svg>
          <div class="label">Facebook</div>
          <div class="desc">Connect with friends and the world</div>
        </a>

        <a class="tile" href="https://www.youtube.com" target="_blank" rel="noopener noreferrer">
          <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#FF0000" d="M23.5 6.2s-.2-1.6-.8-2.3c-.8-.9-1.7-.9-2.1-1C16.5 2.4 12 2.4 12 2.4h-.1s-4.5 0-8.5.5c-.4 0-1.3.1-2.1 1C.7 4.6.5 6.2.5 6.2S0 8 .0 9.8v1.4c0 1.8.5 3.6.5 3.6s.2 1.6.8 2.3c.8.9 1.9.9 2.4 1 1.7.2 7.1.5 7.1.5s4.6 0 8.6-.5c.4 0 1.3-.1 2.1-1 .6-.7.8-2.3.8-2.3s.5-1.8.5-3.6v-1.4c0-1.8-.5-3.6-.5-3.6z"/>
            <path fill="#fff" d="M9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
          </svg>
          <div class="label">YouTube</div>
          <div class="desc">Watch videos and discover creators</div>
        </a>
      </section>

      <footer>Tip: paste a full web address (https://...) in the box to open it directly — otherwise your text will be searched on Google.</footer>
    </div>
  </div>

  <script>
    function isFullUrl(s){
      try{
        const u = new URL(s);
        return u.protocol === 'http:' || u.protocol === 'https:';
      }catch(e){return false}
    }

    function handleSubmit(e){
      e.preventDefault();
      const v = document.getElementById('q').value.trim();
      if(!v) return;
      if(isFullUrl(v)){
        // open the url directly
        window.open(v, '_blank', 'noopener');
      } else {
        // search on google
        const url = 'https://www.google.com/search?q=' + encodeURIComponent(v);
        window.open(url, '_blank', 'noopener');
      }
    }
  </script>
</body>
</html>
