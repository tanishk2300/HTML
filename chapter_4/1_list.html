<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list HTML tutorial</title>
</head>
<body>
    <h1>list in HTML</h1>
    <!-- ordered list -->
     <h2>step to bake a cake </h2>
     <ol>
        <li>on the gas</li>
        <li>use the bowl</li>
        <li>bake it </li>
     </ol>
     <h2>groceries to buy</h2>
     <!-- unordered list -->
      <ul>
        <li>vegitable</li>
        <li>fruits</li>
        <li>dryfruits</li>
      </ul>

      <h2>programing language</h2>
      <!-- defination list -->
      <dl>
          <dt>python</dt><!-- term -->
          <!-- dt=defination term  -->
          <dd>a high level interpreated programing language</dd><!-- defination -->
          <!-- dd=defination data  -->
            
            <dt>java</dt>
            <dd>same as python but well used once </dd>
      </dl>
     <h2></h2>
    
    
</body>
</html>
