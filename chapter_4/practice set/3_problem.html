<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>travel form </title>
</head>

<link rel="stylesheet" href="style.css">

<body>
    
    <form action="/submit.php">
        <!-- for name input  -->
        <div>
            <label for="name.  ">name </label>
            <input type="text"placeholder="enter your name "required>
        </div>
        <!-- for passward input -->
        <div>
            <label for="passward">passward</label>
            <input type="text"placeholder="passward"required>
            
        </div>
        <!-- for email input inbuild @require -->
        <div>
            <label for="email">email</label>
            <input type="text"placeholder="email" required>

        </div>
        <!-- for date input with selecion  -->
         <div>
            <label for="date">date</label>
            <input type="date"placeholder="date" required>
         </div>
         <!-- gender verification   -->
          <div>
            <label for="gender">gender</label required>
            <select  id="select">
                <option value="disable selecion">gender require</option>
                <option value="male">male</option>
                <option value="female">female</option>
                <option value="other">other</option>
            </select>
          </div>
          <!-- these are the radio butten  -->
        <div>
            <p>subscription plan
            </p>
            <input id="basic" type="radio" name="subscription" value="basic">
            <label for="basic">basic</label>
            <input id="premium" type="radio" name="subscription" value="premium">
            <label for="premium">premium</label>
            <input id="VIP" type="radio" name="subscription" value="VIP">
            <label for="VIP">VIP</label>


        </div>
        <div>

            <!-- for cheackbox -->
             <input id="term" type="checkbox" required>
             <label for="term">i will agree with your term and condition </label>

        </div>

         <!--  -->
        <div>
            <label for="comment">comments</label>
            <textarea id="comment "placeholder="enter your comment "rows="4"> </textarea >
            
        </div>
        <!-- submit butten  -->
         <div>
            <button type="button">submit</button>
        </div>





    </form>
</body>
</html>
