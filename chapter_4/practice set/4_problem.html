<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table {
            border-collapse: collapse;
            width: 50%;
            margin: 50px auto;
            font-family: Arial, sans-serif;
        }

        th, td {
            border: 2px solid #333;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #4a6cf7;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
            cursor: pointer;
        }
</style>
<body>
    <table>
        <thead>
        
            <tr>
                <th>name</th>
                <th>score</th>
                <th>match</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>virat kohli</td>
                <td>123</td>
                <td>2</td>
            </tr>
            <tr>
                <td>sachin</td>
                <td>234</td>
                <td>2</td>
            </tr>

        </tbody>
    </table>

</body>
</html>
