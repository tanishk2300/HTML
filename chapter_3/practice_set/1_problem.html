<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zomato-food delivery</title>
</head>
<style>/* General reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins", sans-serif;
}

/* Body */
body {
  background-color: #fff;
  color: #333;
}

/* Header */
header {
  background-color: #e23744; /* Zomato red */
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 60px;
  font-size: 24px;
  font-weight: 700;
  text-transform: capitalize;
  letter-spacing: 1px;
}

/* Navigation links */
header div a {
  color: white;
  text-decoration: none;
  margin-left: 25px;
  font-size: 16px;
  font-weight: 500;
  transition: 0.3s ease;
}

header div a:hover {
  color: #ffcbcb;
  text-decoration: underline;
}

/* Main Section */
main {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
    url("https://b.zmtcdn.com/web_assets/b40b97e677bc7b2ca77e3f1a5f97c3a01594317643.png");
  background-size: cover;
  background-position: center;
  color: white;
}

main div {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 15px;
}

main p {
  font-size: 18px;
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.6;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px 0;
  background-color: #f8f8f8;
  color: #555;
  font-size: 14px;
  margin-top: 80px;
  border-top: 1px solid #ddd;
}
</style>
<body>
    <header>zomato
        <div>
            <a href="home">home</a>
            <a href="about us ">about</a>
            <a href="contact us ">contact</a>

        </div>
    </header>
    <main>
        <div>
            order food anytime anywhere
        </div>
        <p>
            Our app is packed with features that enable you to experience food delivery like never before
        </p>
    </main>
    <footer>
        copyright zomato all rights are reserved
    </footer>
</body>
</html>
